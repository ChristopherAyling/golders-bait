<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            background: #111;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #game-canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            max-width: 95vw;
            max-height: 95vh;
            width: auto;
            height: auto;
        }
    </style>
</head>
<body>
    <!-- <h1>game</h1> -->
    <canvas id="game-canvas"></canvas>
</body>

<script type="module">

const canvas = document.getElementById("game-canvas");
const ctx = canvas.getContext('2d');

import { WASI, File, OpenFile, ConsoleStdout } from
  "https://esm.sh/@bjorn3/browser_wasi_shim";

const fds = [
  new OpenFile(new File([])),
  ConsoleStdout.lineBuffered(msg => console.log(msg)),
  ConsoleStdout.lineBuffered(msg => console.warn(msg)),
];
const wasi = new WASI([], [], fds);

const wasm = await WebAssembly.compileStreaming(fetch("./zig-out/bin/game.wasm"));
const instance = await WebAssembly.instantiate(wasm, {
  wasi_snapshot_preview1: wasi.wasiImport,
});

wasi.initialize(instance);
const exports = instance.exports;

instance.exports.yo();
instance.exports.game_init();

const game_frame = exports.game_frame;

const w = exports.get_screen_w();
const h = exports.get_screen_h();
console.log({w, h})

canvas.width = w;
canvas.height = h;

function resizeCanvas() {
    const maxW = window.innerWidth * 0.95;
    const maxH = window.innerHeight * 0.95;
    const scale = Math.floor(Math.min(maxW / w, maxH / h));
    canvas.style.width = (w * scale) + 'px';
    canvas.style.height = (h * scale) + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const imageData = ctx.createImageData(w, h);

const frame_to_canvas = () => {
  const fbPtr = exports.get_framebuffer_ptr();
  const fbLen = exports.get_framebuffer_len();

  // View the framebuffer as u32 array
  const fb32 = new Uint32Array(exports.memory.buffer, fbPtr, fbLen);
  const pixels = imageData.data; // Uint8ClampedArray [R,G,B,A, R,G,B,A, ...]

  for (let i = 0; i < fbLen; i++) {
      const c = fb32[i];
      const j = i * 4;
      pixels[j]     = (c >>> 16) & 0xFF; // R
      pixels[j + 1] = (c >>> 8)  & 0xFF; // G
      pixels[j + 2] =  c         & 0xFF; // B
      pixels[j + 3] = 255;               // A (always opaque)
  }

  ctx.putImageData(imageData, 0, 0);
}

function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}


while (true) {
  // TODO step game
  // TODO render
  game_frame()
  frame_to_canvas()
  await sleep(30)
  // break;
}

// frame_to_canvas()
</script>
</html>
